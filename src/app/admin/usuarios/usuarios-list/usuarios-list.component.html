<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">
            <i class="bi bi-calendar-event"></i> Usuários para Check In
        </h2>
        <button class="btn btn-primary" (click)="abrirModal()">
            <i class="bi bi-plus-circle"></i> Novo Usuário
        </button>
        
    </div>
    
    <div *ngIf="carregando" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p>Carregando usuários...</p>
    </div>
    
    <div *ngIf="!carregando && usuarios.length > 0" class="table-responsive">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Evento</th>
                    <th>Ativo</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let usuario of usuarios">
                    <td>{{ usuario.nome }}</td>
                    <td>{{ usuario.email}}</td>
                    <td>{{ usuario.evento.nome }}</td>
                    <td>{{ usuario.active ? 'Sim' : 'Não' }}</td>
                    
                </tr>
            </tbody>
        </table>
    </div>
    
    <div *ngIf="!carregando && usuarios.length === 0" class="alert alert-info">
        Nenhum usuário cadastrado.
    </div>
</div>

<!-- Modal Novo Usuário -->
<div
  class="modal fade"
  tabindex="-1"
  [class.show]="modalAberto"
  [style.display]="modalAberto ? 'block' : 'none'"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-person-plus"></i> Novo Usuário para Check-in
        </h5>
        <button type="button" class="btn-close" (click)="fecharModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="formUsuario">

          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" formControlName="nome">
          </div>

          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" formControlName="email">
          </div>

          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" formControlName="senha">
          </div>

          <div class="mb-3">
            <label class="form-label">Evento</label>
            <select class="form-select" formControlName="eventoId">
              <option value="">Selecione o evento</option>
              <option *ngFor="let evento of eventos" [value]="evento.id">
                {{ evento.nome }}
              </option>
            </select>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="active">
            <label class="form-check-label">
              Usuário ativo
            </label>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" (click)="salvar()" [disabled]="formUsuario.invalid">
          Salvar
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="modal-backdrop fade show" *ngIf="modalAberto"></div>
